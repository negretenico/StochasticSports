listener:
  mlb-api-base-url: http://localhost:9999   # overridden per test with MockWebServer
  poll-date: "2026-07-04"
  discovery-interval-seconds: 300
  default-live-poll-seconds: 10
  preview-poll-seconds: 60

kafka:
  topic:
    name: mlb
    partitions: 16
    replicas: 1

spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all
