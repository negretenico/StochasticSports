name: listener

on:
  push:
    branches: [ main ]
    paths: [ 'listener/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'listener/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: make build
      - name: Test
        run: make test-listener
